<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sscGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ashoka Chakra Style Circle -->
  <circle cx="100" cy="90" r="45" fill="none" stroke="url(#sscGrad)" stroke-width="4"/>
  
  <!-- Central Circle -->
  <circle cx="100" cy="90" r="12" fill="url(#sscGrad)"/>
  
  <!-- 8 Spokes -->
  <g transform="translate(100, 90)">
    <line x1="0" y1="0" x2="0" y2="-45" stroke="url(#sscGrad)" stroke-width="3"/>
    <line x1="0" y1="0" x2="32" y2="-32" stroke="url(#sscGrad)" stroke-width="3"/>
    <line x1="0" y1="0" x2="45" y2="0" stroke="url(#sscGrad)" stroke-width="3"/>
    <line x1="0" y1="0" x2="32" y2="32" stroke="url(#sscGrad)" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="45" stroke="url(#sscGrad)" stroke-width="3"/>
    <line x1="0" y1="0" x2="-32" y2="32" stroke="url(#sscGrad)" stroke-width="3"/>
    <line x1="0" y1="0" x2="-45" y2="0" stroke="url(#sscGrad)" stroke-width="3"/>
    <line x1="0" y1="0" x2="-32" y2="-32" stroke="url(#sscGrad)" stroke-width="3"/>
  </g>
  
  <!-- Stars at ends -->
  <circle cx="100" cy="45" r="4" fill="#FFD700"/>
  <circle cx="145" cy="90" r="4" fill="#FFD700"/>
  <circle cx="100" cy="135" r="4" fill="#FFD700"/>
  <circle cx="55" cy="90" r="4" fill="#FFD700"/>
  
  <!-- Text -->
  <text x="100" y="165" font-size="24" font-weight="bold" fill="#FF6B35" text-anchor="middle" font-family="Arial, sans-serif">SSC</text>
</svg>
