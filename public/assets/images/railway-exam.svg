<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="railwayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Train Body -->
  <g transform="translate(100, 85)">
    <!-- Main body -->
    <rect x="-45" y="-25" width="90" height="45" rx="5" fill="url(#railwayGrad)"/>
    
    <!-- Windows -->
    <rect x="-35" y="-15" width="20" height="15" rx="2" fill="#FFFFFF"/>
    <rect x="-8" y="-15" width="20" height="15" rx="2" fill="#FFFFFF"/>
    <rect x="18" y="-15" width="20" height="15" rx="2" fill="#FFFFFF"/>
    
    <!-- Roof -->
    <path d="M -50 -25 L -45 -35 L 45 -35 L 50 -25 Z" fill="url(#railwayGrad)"/>
    
    <!-- Wheels -->
    <circle cx="-25" cy="25" r="8" fill="#333"/>
    <circle cx="-25" cy="25" r="4" fill="#888"/>
    <circle cx="25" cy="25" r="8" fill="#333"/>
    <circle cx="25" cy="25" r="4" fill="#888"/>
    
    <!-- Track lines -->
    <line x1="-60" y1="35" x2="60" y2="35" stroke="#666" stroke-width="3"/>
    <line x1="-60" y1="40" x2="60" y2="40" stroke="#666" stroke-width="3"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="160" font-size="18" font-weight="bold" fill="#DC2626" text-anchor="middle" font-family="Arial, sans-serif">RAILWAY</text>
</svg>
