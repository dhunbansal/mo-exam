<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cdsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield -->
  <path d="M 100 45 L 145 60 L 145 95 Q 145 125 100 145 Q 55 125 55 95 L 55 60 Z" fill="url(#cdsGrad)" stroke="#047857" stroke-width="3"/>
  
  <!-- Inner Shield Design -->
  <path d="M 100 55 L 135 67 L 135 92 Q 135 115 100 130 Q 65 115 65 92 L 65 67 Z" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Star -->
  <g transform="translate(100, 90)">
    <path d="M 0 -15 L 4 -5 L 15 -5 L 6 2 L 10 13 L 0 6 L -10 13 L -6 2 L -15 -5 L -4 -5 Z" fill="#FFD700"/>
  </g>
  
  <!-- Crossed Swords -->
  <g transform="translate(100, 95)">
    <!-- Sword 1 -->
    <rect x="-2" y="-25" width="4" height="35" fill="#C0C0C0" transform="rotate(-45 0 0)"/>
    <circle cx="-18" cy="-18" r="4" fill="#FFD700"/>
    
    <!-- Sword 2 -->
    <rect x="-2" y="-25" width="4" height="35" fill="#C0C0C0" transform="rotate(45 0 0)"/>
    <circle cx="18" cy="-18" r="4" fill="#FFD700"/>
  </g>
  
  <!-- Tricolor bars at bottom of shield -->
  <rect x="70" y="115" width="60" height="4" fill="#FF9933"/>
  <rect x="70" y="119" width="60" height="4" fill="#FFFFFF"/>
  <rect x="70" y="123" width="60" height="4" fill="#138808"/>
  
  <!-- Text -->
  <text x="100" y="170" font-size="24" font-weight="bold" fill="#059669" text-anchor="middle" font-family="Arial, sans-serif">CDS</text>
</svg>
