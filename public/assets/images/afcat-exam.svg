<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="afcatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fighter Jet -->
  <g transform="translate(100, 90)">
    <!-- Body -->
    <path d="M 0 -15 L 55 5 L 50 10 L 0 0 L -50 10 L -55 5 Z" fill="url(#afcatGrad)"/>
    
    <!-- Cockpit -->
    <ellipse cx="15" cy="-8" rx="12" ry="8" fill="#87CEEB"/>
    
    <!-- Wings -->
    <path d="M -10 0 L -50 -20 L -45 -15 L -10 5 Z" fill="url(#afcatGrad)"/>
    <path d="M 10 0 L 50 -20 L 45 -15 L 10 5 Z" fill="url(#afcatGrad)"/>
    
    <!-- Tail -->
    <path d="M -50 8 L -55 -10 L -50 -5 Z" fill="url(#afcatGrad)"/>
    
    <!-- Engine flames -->
    <path d="M -50 10 L -60 8 L -55 10 L -60 12 Z" fill="#FFD700"/>
    <path d="M -55 10 L -65 7 L -60 10 L -65 13 Z" fill="#FF6B35"/>
    
    <!-- Tricolor stripes on wings -->
    <rect x="15" y="-18" width="30" height="2" fill="#FF9933"/>
    <rect x="15" y="-16" width="30" height="2" fill="#FFFFFF"/>
    <rect x="15" y="-14" width="30" height="2" fill="#138808"/>
  </g>
  
  <!-- Clouds -->
  <ellipse cx="40" cy="120" rx="15" ry="8" fill="#E0E7FF" opacity="0.7"/>
  <ellipse cx="160" cy="130" rx="18" ry="9" fill="#E0E7FF" opacity="0.7"/>
  
  <!-- Text -->
  <text x="100" y="165" font-size="20" font-weight="bold" fill="#2563EB" text-anchor="middle" font-family="Arial, sans-serif">AFCAT</text>
</svg>
